<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Player</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            padding-bottom: 120px; /* Nhường chỗ cho thanh player cố định */
        }
        
        .audio-card {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .audio-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .audio-card.active {
            border-color: #3b82f6; /* Xanh dương của tailwind */
            background-color: #eff6ff;
        }
        
        /* Chỉnh lại thẻ audio trên thanh player cho gọn */
        #global-audio {
            border-radius: 9999px;
            height: 40px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pt-12 px-4">

    <!-- Danh sách bài hát -->
    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-lg p-6 sm:p-8 mb-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Phàm nhân tu tiên</h1>
        </div>
        
        <!-- Vùng chứa danh sách -->
        <div id="audio-container" class="space-y-4">
            <!-- Render động bằng app.js -->
        </div>
    </div>

    <!-- Thanh Player cố định ở đáy trang (Glassmorphism) -->
    <div id="global-player-container" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] transform translate-y-full transition-transform duration-300">
        <div class="max-w-4xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center gap-4 justify-between">
            
            <!-- Thông tin bài hát đang phát -->
            <div class="flex items-center gap-3 min-w-0 flex-1 w-full sm:w-auto">
                <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0 text-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zm12-3c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zM9 10l12-3" />
                    </svg>
                </div>
                <div class="truncate">
                    <p id="player-title" class="text-sm font-semibold text-gray-800 truncate">Chưa chọn bài hát</p>
                    <p class="text-xs text-gray-500">Đang phát</p>
                </div>
            </div>

            <!-- Thẻ Audio Control -->
            <div class="flex-1 w-full sm:w-auto flex items-center justify-end gap-2">
                <button id="btn-rewind" class="flex items-center justify-center w-10 h-10 bg-gray-100 hover:bg-blue-100 hover:text-blue-600 text-gray-600 rounded-full transition-colors flex-shrink-0 font-bold text-xs" title="Tua lại 10s">-10s</button>
                
                <audio id="global-audio" class="w-full sm:w-96 outline-none" controls preload="metadata"></audio>
                
                <button id="btn-forward" class="flex items-center justify-center w-10 h-10 bg-gray-100 hover:bg-blue-100 hover:text-blue-600 text-gray-600 rounded-full transition-colors flex-shrink-0 font-bold text-xs" title="Tua đi 10s">+10s</button>
            </div>
            
        </div>
    </div>

    <!-- Gọi file data.js TRƯỚC để lấy dữ liệu -->
    <script src="js/data.js"></script>
    <!-- Gọi file app.js SAU để xử lý logic dựa trên dữ liệu -->
    <script src="js/app.js"></script>
</body>
</html>
