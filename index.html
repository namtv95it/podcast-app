<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phàm Nhân Tu Tiên</title>
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Tắt tự động dark mode theo hệ điều hành
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding-bottom: 120px; /* Nhường chỗ cho thanh player cố định */
        }
        
        .audio-card {
            transition: all 0.2s ease-in-out;
        }
        .audio-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .audio-card.active {
            border-color: #3b82f6; /* Xanh dương của tailwind */
            background-color: #eff6ff;
        }
        .dark .audio-card.active {
            border-color: #3b82f6;
            background-color: #1e3a8a; /* Xanh đậm cho dark mode */
        }
        
        /* Chỉnh lại thẻ audio trên thanh player cho gọn */
        #global-audio {
            border-radius: 9999px;
            height: 40px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

    <!-- Header Full Width -->
    <div class="sticky top-0 z-20 w-full bg-white/80 dark:bg-gray-900/80 backdrop-blur-md shadow-sm dark:shadow-none border-b border-gray-200 dark:border-gray-800 py-4 transition-colors duration-300 relative">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 text-center transition-colors duration-300">PHÀM NHÂN TU TIÊN</h1>
        
        <!-- Dark Mode Toggle Button -->
        <button id="theme-toggle" type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none rounded-lg text-sm p-2.5 transition-colors duration-300">
            <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
        </button>
    </div>

    <!-- Danh sách bài hát -->
    <div class="max-w-2xl w-full mx-auto px-4 mt-6 mb-20">
        <!-- Vùng chứa danh sách -->
        <div id="audio-container" class="space-y-4">
            <!-- Render động bằng app.js -->
        </div>
    </div>

    <!-- Thanh Player cố định ở đáy trang (Glassmorphism) -->
    <div id="global-player-container" class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] dark:shadow-none transform translate-y-full transition-all duration-300">
        <div class="max-w-4xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center gap-4 justify-between">
            
            <!-- Thông tin bài hát đang phát và Volume -->
            <div class="flex items-center justify-between min-w-0 flex-1 w-full sm:w-auto">
                <div class="flex items-center gap-3 min-w-0 pr-2">
                    <div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/30 rounded-lg flex items-center justify-center flex-shrink-0 text-blue-500 dark:text-blue-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zm12-3c-1.105 0-2-.895-2-2s.895-2 2-2 2 .895 2 2-.895 2-2 2zM9 10l12-3" />
                        </svg>
                    </div>
                    <div class="truncate">
                        <p id="player-title" class="text-sm font-semibold text-gray-800 dark:text-gray-100 truncate">Chưa chọn bài hát</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Đang phát</p>
                    </div>
                </div>

                <!-- Điều khiển Volume và Tốc độ -->
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2">
                        <button id="btn-mute" class="text-gray-400 dark:text-gray-500 hover:text-blue-500 dark:hover:text-blue-400 transition-colors focus:outline-none" title="Tắt/Mở âm thanh">
                            <svg id="icon-vol-up" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                            <svg id="icon-vol-mute" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                            </svg>
                        </button>
                        <input type="range" id="volume-bar" value="1" min="0" max="1" step="0.05" class="w-16 sm:w-20 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                    <!-- Tốc độ phát -->
                    <select id="playback-speed" class="text-xs font-semibold bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-700 rounded px-1.5 py-1 focus:outline-none cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="Tốc độ phát">
                        <option value="1" selected>1x</option>
                        <option value="1.1">1.1x</option>
                        <option value="1.2">1.2x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    <!-- Nút Auto Play -->
                    <button id="btn-autoplay" class="text-xs font-semibold bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 rounded px-2 py-1 focus:outline-none cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors" title="Tự động qua bài">
                        <span id="autoplay-text">Bật</span>
                    </button>
                </div>
            </div>

            <!-- Thẻ Audio Control Custom -->
            <div class="flex-1 w-full sm:max-w-md flex flex-col gap-2 mt-4 sm:mt-0">
                <!-- Hàng 1: Progress Bar -->
                <div class="flex items-center gap-2 w-full text-xs font-medium text-gray-500 dark:text-gray-400">
                    <span id="time-current">00:00</span>
                    <input type="range" id="progress-bar" value="0" min="0" max="100" class="flex-1 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500 hover:accent-blue-600 transition-all">
                    <span id="time-duration">00:00</span>
                </div>
                
                <!-- Hàng 2: Các nút điều khiển trung tâm -->
                <div class="flex items-center justify-between gap-1 sm:gap-2 w-full">
                    <!-- Nút Tập trước -->
                    <button id="btn-prev-track" class="flex-1 flex items-center justify-center h-10 bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 text-gray-600 dark:text-gray-300 rounded-full transition-colors shadow-sm" title="Tập trước">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" viewBox="0 0 20 20" fill="currentColor">
                          <path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z" />
                        </svg>
                    </button>

                    <!-- Nút Rewind 30s -->
                    <button id="btn-rewind-30" class="flex-1 flex items-center justify-center h-10 bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 text-gray-600 dark:text-gray-300 rounded-full transition-colors shadow-sm text-[10px] sm:text-xs font-bold" title="Tua lại 30s">-30s</button>

                    <!-- Nút Rewind 10s -->
                    <button id="btn-rewind-10" class="flex-1 flex items-center justify-center h-10 bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 text-gray-600 dark:text-gray-300 rounded-full transition-colors shadow-sm text-[10px] sm:text-xs font-bold" title="Tua lại 10s">-10s</button>
                    
                    <!-- Nút Play/Pause -->
                    <button id="btn-play-pause" class="flex items-center justify-center w-14 h-14 bg-blue-500 text-white hover:bg-blue-600 rounded-full transition-colors shadow-md flex-shrink-0" title="Phát/Tạm dừng">
                        <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 ml-1" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 hidden" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    
                    <!-- Nút Forward 10s -->
                    <button id="btn-forward-10" class="flex-1 flex items-center justify-center h-10 bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 text-gray-600 dark:text-gray-300 rounded-full transition-colors shadow-sm text-[10px] sm:text-xs font-bold" title="Tua đi 10s">+10s</button>

                    <!-- Nút Forward 30s -->
                    <button id="btn-forward-30" class="flex-1 flex items-center justify-center h-10 bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 text-gray-600 dark:text-gray-300 rounded-full transition-colors shadow-sm text-[10px] sm:text-xs font-bold" title="Tua đi 30s">+30s</button>

                    <!-- Nút Tập sau -->
                    <button id="btn-next-track" class="flex-1 flex items-center justify-center h-10 bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 dark:hover:text-blue-400 text-gray-600 dark:text-gray-300 rounded-full transition-colors shadow-sm" title="Tập sau">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832L10 11.202v2.798a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4A1 1 0 0010 6v2.798L4.555 5.168z" />
                        </svg>
                    </button>
                </div>
                
                <!-- Thẻ audio ẩn -->
                <audio id="global-audio" class="hidden" preload="metadata"></audio>
            </div>
            
        </div>
    </div>

    <!-- Gọi file data.js TRƯỚC để lấy dữ liệu -->
    <script src="js/data.js"></script>
    <!-- Gọi file app.js SAU để xử lý logic dựa trên dữ liệu -->
    <script src="js/app.js"></script>
</body>
</html>
